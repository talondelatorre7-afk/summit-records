<header id="cs-navigation">
    <div class="cs-container">
        <a href="/" class="cs-logo" aria-label="Deep Sea Digital Home" style="text-decoration: none;">
            <img class="cs-logo-light" src="/assets/images/deep2.png" alt="Deep Sea Digital Logo" style="max-height: 48px; width: auto;">
            <img class="cs-logo-dark" src="/assets/images/deep1.png" alt="Deep Sea Digital Logo" style="max-height: 48px; width: auto;">
        </a>

        
        <nav class="cs-nav" aria-label="main navigation">
            <button class="cs-toggle" id="cs-toggle" aria-expanded="false" aria-controls="cs-ul-wrapper" aria-label="mobile menu toggle" aria-haspopup="menu">
                <span class="cs-box" aria-hidden="true">
                    <span class="cs-line cs-line1" aria-hidden="true"></span>
                    <span class="cs-line cs-line2" aria-hidden="true"></span>
                    <span class="cs-line cs-line3" aria-hidden="true"></span>
                </span>
            </button>
            <div class="cs-ul-wrapper" id="cs-ul-wrapper" inert>
                <ul id="cs-expanded" class="cs-ul">
                    <li class="cs-li">
                        <a href="/" class="cs-li-link {% if page.url == '/' %} cs-active {% endif %}">Home</a>
                    </li>
                    <li class="cs-li">
                        <a href="/roster/" class="cs-li-link {% if page.url == '/roster/' %} cs-active {% endif %}">Roster</a>
                    </li>
                    <li class="cs-li">
                        <a href="/hvze/" class="cs-li-link {% if page.url == '/hvze/' %} cs-active {% endif %}">HVZE</a>
                    </li>
                    <li class="cs-li">
                        <a href="/the-deal/" class="cs-li-link {% if page.url == '/the-deal/' %} cs-active {% endif %}">The Deal</a>
                    </li>
                    <li class="cs-li cs-hide-on-desktop">
                        <a href="/submit/" class="cs-li-link {% if page.url == '/submit/' %} cs-active {% endif %}">Submit Demo</a>
                    </li>
                </ul>
            </div>
        </nav>
        
        <a href="/submit/" class="cs-button-solid cs-nav-button" style="background-color: var(--summit-cyan); color: var(--summit-abyss); font-family: 'Space Grotesk', sans-serif; font-weight: 800; text-transform: uppercase; border-radius: 0;">Submit Demo</a>
        
        <button id="dark-mode-toggle" aria-label="dark mode toggle" aria-pressed="false">
            <img class="cs-moon" aria-hidden="true" src="/assets/svgs/moon.svg" decoding="async" alt="dark mode" width="15" height="15">
            <img class="cs-sun" aria-hidden="true" src="/assets/svgs/sun.svg" decoding="async" alt="light mode" width="15" height="15">
        </button>
    </div>
</header>
